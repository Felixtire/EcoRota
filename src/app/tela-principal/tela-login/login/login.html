<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="left-side">

    <div class="overlay"></div>

    <div class="content">

      <div class="logo">
        🌱
      </div>

      <h1>EcoRota</h1>

      <p>
        Acompanhe seus descartes, pontos e impacto
        ambiental em tempo real.
      </p>

    </div>

  </div>

  <!-- FORMULÁRIO -->
  <div class="form-container">

    <div class="form-box">

      <h2>Bem-vindo</h2>

      <span>
        Faça login na sua conta
      </span>

      <form [formGroup]="formularioLogin">

        <div class="input-group">
          <input
            type="email"
            placeholder="E-mail"
            formControlName="email"
          >
        </div>

        <div class="input-group">
          <input
            type="password"
            placeholder="Senha"
            formControlName="senha"
          >
        </div>

        <div class="options">

          <div class="remember">

            <input type="checkbox" id="remember">

            <label for="remember">
              Lembrar senha
            </label>

          </div>

          <a href="#">
            Esqueci minha senha
          </a>

        </div>

        <button class="btn-login" (click)="realizarLogin()">

          Entrar

          <span>
            🌿
          </span>

        </button>

      </form>

      <div class="register-link">

        Não possui conta?

        <a routerLink="">
          Criar conta
        </a>

      </div>

    </div>

  </div>

</div>
