<div class="container">


  <div class="left-side">

    <div class="overlay"></div>

    <div class="content">

      <div class="logo">
        🌿
      </div>

      <h1>EcoRota</h1>

      <p>
        Transformando descartes em impacto positivo
        para o planeta.
      </p>

    </div>

  </div>


  <div class="form-container">

    <div class="form-box">

      <h2>Bem-vindo ao EcoRota</h2>

      <span>
        Crie sua conta
      </span>

      <form>

        <div class="input-group">
          <input
            type="text"
            placeholder="Nome completo"
          >
        </div>

        <div class="input-group">
          <input
            type="text"
            placeholder="Telefone"
          >
        </div>

        <div class="input-group">
          <input
            type="email"
            placeholder="E-mail"
          >
        </div>

        <div class="input-group">
          <input
            type="password"
            placeholder="Senha"
          >
        </div>

        <div class="input-group">
          <input
            type="password"
            placeholder="Repetir senha"
          >
        </div>

        <button class="btn-register">

          Criar conta

          <span>
            🌿
          </span>

        </button>

      </form>

      <div class="login-link">

        Já possui conta?

        <a routerLink="/login">
          Login
        </a>

      </div>

    </div>

  </div>

</div>
